    <div id="app">
      <canvas id="game-canvas" tabindex="0"></canvas>

        <div id="load-status">正在初始化...</div>
        <div id="animation-status">动作：等待人物加载</div>

          <div class="team-name">猪小弟</div>

      </section>
      <section class="hud hud-controls">
        <div>左屏 铃铛：WASD 移动，按住 Space 蓄力</div>
        <div>蓄力时：A/D 调左右，W/S 调高低，松开射门</div>
        <div>右屏 猪小弟：方向键或 IJKL 移动，Enter 扑救，R 重开</div>
      </section>
      <div class="split-line" aria-hidden="true"></div>
    </div>
  </body>
